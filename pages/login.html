<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Saint Thunderbird Tutoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <div class="mesh-gradient"></div>
    <button class="theme-toggle-btn" onclick="toggleTheme()">🌓</button>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">⚡</div>
        </div>

        <h1>Saint Thunderbird</h1>
        <p class="subtitle">Welcome back to your learning journey</p>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('student')">Student</div>
            <div class="tab" onclick="switchTab('tutor')">Tutor</div>
        </div>

        <!-- Student Login -->
        <div id="student-content" class="tab-content active">
            <form id="studentLoginForm">
                <div class="form-group">
                    <label for="studentEmail">Email</label>
                    <input type="email" id="studentEmail" name="email" placeholder="student@example.com" required>
                </div>

                <div class="form-group">
                    <label for="studentPassword">Password</label>
                    <input type="password" id="studentPassword" name="password" placeholder="Enter your password"
                        required>
                    <div class="forgot-password">
                        <a onclick="forgotPassword('student'); return false;">Forgot Password?</a>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="studentRemember" name="remember">
                    <label for="studentRemember">Remember me</label>
                </div>

                <button type="submit" class="btn-submit">Login as Student</button>
            </form>

            <div class="divider">OR</div>

            <p class="signup-link">
                Don't have an account? <a href="signup.html">Sign up →</a>
            </p>
        </div>

        <!-- Tutor Login -->
        <div id="tutor-content" class="tab-content">
            <form id="tutorLoginForm">
                <div class="form-group">
                    <label for="tutorEmail">Email</label>
                    <input type="email" id="tutorEmail" name="email" placeholder="tutor@example.com" required>
                </div>

                <div class="form-group">
                    <label for="tutorPassword">Password</label>
                    <input type="password" id="tutorPassword" name="password" placeholder="Enter your password"
                        required>
                    <div class="forgot-password">
                        <a onclick="forgotPassword('tutor'); return false;">Forgot Password?</a>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="tutorRemember" name="remember">
                    <label for="tutorRemember">Remember me</label>
                </div>

                <button type="submit" class="btn-submit">Login as Tutor</button>
            </form>

            <div class="divider">OR</div>

            <p class="signup-link">
                Don't have an account? <a href="signup.html">Sign up →</a>
            </p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('st-theme', isLight ? 'light' : 'dark');
            document.querySelector('.theme-toggle-btn').textContent = isLight ? '☀️' : '🌓';
        }

        (function applySavedTheme() {
            const savedTheme = localStorage.getItem('st-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.querySelector('.theme-toggle-btn').textContent = '☀️';
            }
        })();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const clickEvent = window.event;
            if (clickEvent && clickEvent.target) {
                clickEvent.target.classList.add('active');
            }

            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + '-content').classList.add('active');
        }

        function forgotPassword(userType) {
            const email = prompt(`Enter your ${userType} email address to reset your password:`);
            if (email) {
                alert(`Password reset link has been sent to ${email}. Please check your inbox.`);
            }
        }

        async function handleLogin(userType) {
            const isTutor = userType === 'tutor';
            const emailInputId = isTutor ? 'tutorEmail' : 'studentEmail';
            const passwordInputId = isTutor ? 'tutorPassword' : 'studentPassword';
            const rememberInputId = isTutor ? 'tutorRemember' : 'studentRemember';

            const email = document.getElementById(emailInputId).value;
            const password = document.getElementById(passwordInputId).value;
            const remember = document.getElementById(rememberInputId).checked;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (!data.success) {
                alert('❌ Error: ' + data.error);
                return;
            }

            const user = data.user;
            const appStatus = user.tutorApplication?.status || 'none';
            const isAdmin = user.email === 'dylanduancanada@gmail.com';

            // Store auth data
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('user', JSON.stringify(user));

            if (remember) {
                localStorage.setItem('rememberEmail', email);
            }

            // STUDENT TAB — always go to student dashboard
            if (!isTutor) {
                alert('✅ Welcome back, ' + user.firstName + '!');
                window.location.href = 'student-dashboard.html';
                return;
            }

            // TUTOR TAB — route based on role + approval status
            if (isAdmin) {
                alert('✅ Welcome back, Admin!');
                window.location.href = 'tutor-dashboard.html';
                return;
            }

            if (user.userType === 'tutor' && appStatus === 'approved') {
                alert('✅ Welcome back, ' + user.firstName + '!');
                window.location.href = 'tutor-dashboard.html';
                return;
            }

            if (appStatus === 'pending') {
                alert('⏳ Your tutor application is pending approval.');
                window.location.href = 'tutor-pending.html';
                return;
            }

            if (appStatus === 'denied') {
                alert('❌ Your tutor application was denied. Please contact support.');
                return;
            }

            // No tutor application at all
            alert('❌ You do not have a tutor application. Please sign up as a tutor first.');
        }

        document.getElementById('studentLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            try {
                await handleLogin('student');
            } catch (error) {
                alert('❌ Connection error: ' + error.message);
            }
        });

        document.getElementById('tutorLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            try {
                await handleLogin('tutor');
            } catch (error) {
                alert('❌ Connection error: ' + error.message);
            }
        });

        window.addEventListener('load', function () {
            const remembered = localStorage.getItem('rememberEmail');
            if (remembered) {
                document.getElementById('studentEmail').value = remembered;
                document.getElementById('tutorEmail').value = remembered;
            }
        });
    </script>
    <script src="../auth.js"></script>
</body>

</html>
