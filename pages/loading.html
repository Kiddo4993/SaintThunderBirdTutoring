<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Thunderbird - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    
    <link rel="stylesheet" href="../styles/loading.css">
</head>
<body>
    <div class="loading-container" id="loadingContainer">
        <!-- Stars -->
        <div class="stars-field" id="starsField"></div>

        <!-- Background Glow Orbs -->
        <div class="glow-orb orb-primary"></div>
        <div class="glow-orb orb-secondary"></div>
        <div class="glow-orb orb-accent"></div>

        <!-- Scan Line -->
        <div class="scan-line"></div>

        <!-- Main Content -->
        <div class="loading-content">
            <!-- Energy Ring -->
            <div class="energy-ring"></div>

            <!-- Hologram Container -->
            <div class="hologram-container">
                <div class="thunderbird-hologram">⚡</div>
            </div>

            <!-- Title and Subtitle -->
            <h1 class="intro-title">SAINT THUNDERBIRD</h1>
            <p class="intro-subtitle">Tutoring</p>

            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-label">Loading</div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>

            <!-- Loading Dots -->
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        // Generate Stars
        function generateStars() {
            const starsField = document.getElementById('starsField');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.opacity = Math.random() * 0.7 + 0.3;
                starsField.appendChild(star);
            }
        }

        // Generate Grid Lines
        function generateGrid() {
            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid-lines';
            
            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line-h';
                line.style.top = (i * 10) + '%';
                gridContainer.appendChild(line);
            }

            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line-v';
                line.style.left = (i * 10) + '%';
                gridContainer.appendChild(line);
            }

            document.querySelector('.loading-container').appendChild(gridContainer);
        }

        generateStars();
        generateGrid();

        // Flag to prevent multiple redirects
        let isRedirecting = false;

        // Function to handle redirect
        function goToMainPage() {
            if (isRedirecting) return; // Prevent multiple redirects
            isRedirecting = true;
            
            const container = document.getElementById('loadingContainer');
            if (container) {
                container.classList.add('exit');
            }
            
            setTimeout(() => {
                // Set flag BEFORE redirecting to prevent loop
                localStorage.setItem('skip_intro', 'true');
                window.location.replace('index.html');
            }, 1000);
        }

        // Auto-redirect after 5 seconds
        setTimeout(() => {
            goToMainPage();
        }, 5000);

        // Skip on Click
        document.body.addEventListener('click', () => {
            goToMainPage();
        });

        // Skip on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                goToMainPage();
            }
        });
    </script>
</body>
</html>
