<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Thunderbird - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    
    <link rel="stylesheet" href="../styles/loading.css">
</head>
<body>
    <div class="loading-container" id="loadingContainer">
        <!-- Stars -->
        <div class="stars-field" id="starsField"></div>

        <!-- Background Glow Orbs -->
        <div class="glow-orb orb-primary"></div>
        <div class="glow-orb orb-secondary"></div>
        <div class="glow-orb orb-accent"></div>

        <!-- Scan Line -->
        <div class="scan-line"></div>

        <!-- Main Content -->
        <div class="loading-content">
            <!-- Energy Ring -->
            <div class="energy-ring"></div>

            <!-- Hologram Container -->
            <div class="hologram-container">
                <div class="thunderbird-hologram">⚡</div>
            </div>

            <!-- Title and Subtitle -->
            <h1 class="intro-title">SAINT THUNDERBIRD</h1>
            <p class="intro-subtitle">Tutoring</p>

            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-label">Loading</div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>

            <!-- Loading Dots -->
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script src="../scripts/loading.js"></script>
</body>
</html>
