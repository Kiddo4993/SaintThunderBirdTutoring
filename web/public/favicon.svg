<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- dark rounded-square background -->
  <rect width="200" height="200" fill="#0d0a06" rx="36"/>
  <!--
    Bird native space: 500x240, pivot at (250,140).
    Favicon uses SOLID wings (no individual rays) so the
    silhouette reads clearly at 16-32px.
    Scale 0.34, translate (15,55) → bird spans ~x49-151, y55-135.
  -->
  <g fill="#d4a574" transform="translate(15,55) scale(0.34)">

    <!-- Left wing — solid filled fan from pivot through all 11 ray-tips -->
    <polygon points="
      250,140
      188,14  166,17  147,27  129,40  115,56
      105,76  101,97  103,119 110,140 121,158 134,174
    "/>

    <!-- Right wing — mirror -->
    <polygon points="
      250,140
      312,14  334,17  353,27  371,40  385,56
      395,76  399,97  397,119 390,140 379,158 366,174
    "/>

    <!-- Head -->
    <polygon points="250,58 267,92 259,118 241,118 233,92"/>

    <!-- Shoulder -->
    <polygon points="241,118 259,118 263,140 237,140"/>

    <!-- Body (solid, chevrons too small at favicon size) -->
    <polygon points="237,140 263,140 259,205 241,205"/>

    <!-- Tail -->
    <polygon points="241,205 259,205 254,222 246,222"/>

  </g>
</svg>
